<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-hidden="true" role="img">
	<defs>
		<clipPath id="lang-disc">
			<circle cx="32" cy="32" r="32" />
		</clipPath>
	</defs>
	<!-- Circular: each side is only the half-disk (no bandera rectangular completa) -->
	<g clip-path="url(#lang-disc)" shape-rendering="crispEdges">
		<!-- ES: semidisco izquierdo, tres franjas horizontales -->
		<rect x="0" y="0" width="32" height="21" fill="#C60B1E" />
		<rect x="0" y="21" width="32" height="22" fill="#F1BF00" />
		<rect x="0" y="43" width="32" height="21" fill="#C60B1E" />
		<!-- US: semidisco derecho, franjas anchas (lectura rápida) -->
		<rect x="32" y="0" width="32" height="8" fill="#B22234" />
		<rect x="32" y="8" width="32" height="8" fill="#FFFFFF" />
		<rect x="32" y="16" width="32" height="8" fill="#B22234" />
		<rect x="32" y="24" width="32" height="8" fill="#FFFFFF" />
		<rect x="32" y="32" width="32" height="8" fill="#B22234" />
		<rect x="32" y="40" width="32" height="8" fill="#FFFFFF" />
		<rect x="32" y="48" width="32" height="8" fill="#B22234" />
		<rect x="32" y="56" width="32" height="8" fill="#FFFFFF" />
		<!-- Cantón solo sobre la mitad derecha (no bandera US completa) -->
		<rect x="32" y="0" width="14" height="32" fill="#3C3B6E" />
		<g fill="#FFFFFF" shape-rendering="crispEdges">
			<rect x="34" y="5" width="2" height="2" />
			<rect x="40" y="5" width="2" height="2" />
			<rect x="37" y="10" width="2" height="2" />
			<rect x="43" y="10" width="2" height="2" />
			<rect x="34" y="15" width="2" height="2" />
			<rect x="40" y="15" width="2" height="2" />
			<rect x="37" y="20" width="2" height="2" />
			<rect x="43" y="20" width="2" height="2" />
			<rect x="34" y="25" width="2" height="2" />
			<rect x="40" y="25" width="2" height="2" />
		</g>
		<!-- Separador vertical nítido -->
		<rect x="31" y="0" width="2" height="64" fill="#112d57" fill-opacity="0.35" />
	</g>
	<!-- Borde del círculo -->
	<circle
		cx="32"
		cy="32"
		r="31.5"
		fill="none"
		stroke="#112d57"
		stroke-opacity="0.28"
		stroke-width="1"
		shape-rendering="geometricPrecision"
	/>
</svg>
